version: 0.2
phases:
  install:
    runtime-versions:
      java: corretto17
      nodejs: 18
    commands:
      - echo "Installing dependencies"
      - cd Frontend && npm ci && cd ..
  build:
    commands:
      - echo "Building React Frontend"
      - cd Frontend && npm run build && cd ..
      - echo "Building Spring Boot Backend"
      - cd Backend && chmod +x mvnw && ./mvnw clean package -DskipTests -e 2>&1 && cd ..
      - echo "BUILD DONE - listing target"
      - ls -la Backend/target/
  post_build:
    commands:
      - echo "Preparing deployment package"
      - mkdir -p deployment/scripts
      - cp Backend/target/Finsmart_Finances-0.0.1-SNAPSHOT.jar deployment/
      - cp appspec.yml deployment/ 2>/dev/null || cp Backend/appspec.yml deployment/ 2>/dev/null || echo "no appspec"
      - cp scripts/start.sh deployment/scripts/
      - cp scripts/stop.sh deployment/scripts/
      - cp -r Frontend/build deployment/frontend-build
artifacts:
  files:
    - deployment/**/*
  discard-paths: no
  base-directory: '.'
cache:
  paths:
    - '/root/.m2/**/*'
    - 'Frontend/node_modules/**/*'
