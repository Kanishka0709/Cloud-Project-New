version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
      nodejs: 18
    commands:
      - echo "Installing dependencies..."

  pre_build:
    commands:
      - echo "Building React frontend..."
      - cd frontend
      - npm ci
      - npm run build
      - cd ..

  build:
    commands:
      - echo "Building Spring Boot backend..."
      - cd backend
      - chmod +x mvnw
      - ./mvnw clean package -DskipTests
      - cd ..

  post_build:
    commands:
      - echo "Preparing deployment artifacts..."
      - mkdir -p deployment/frontend
      - cp -r frontend/build/* deployment/frontend/
      - cp backend/target/*.jar deployment/app.jar
      - cp appspec.yml deployment/
      - cp -r scripts/ deployment/scripts/

artifacts:
  files:
    - deployment/**/*
    - appspec.yml
    - scripts/**/*
  discard-paths: no
  base-directory: '.'

cache:
  paths:
    - '/root/.m2/**/*'
    - 'frontend/node_modules/**/*'
